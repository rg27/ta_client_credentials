<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credential Vault Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#10b981', 'primary-dark': '#059669' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-slate-50 p-6 font-sans antialiased text-slate-900">
    <div class="max-w-6xl mx-auto">
        <!-- THE WRAPPER TARGETED BY JS -->
        <div id="main-wrapper">
            <div class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden flex flex-col">
                <div class="bg-emerald-50/50 px-6 py-4 border-b border-slate-200 flex justify-between items-center shrink-0">
                    <h2 class="text-[10px] font-black text-primary uppercase tracking-[0.2em]">Credential Management</h2>
                    <div class="flex items-center space-x-2">
                        <button onclick="openNotifyModal()" class="bg-blue-600 hover:bg-blue-700 text-white text-[11px] font-bold py-2 px-4 rounded shadow-sm flex items-center transition-all">
                            <i data-lucide="send" class="w-3 h-3 mr-2"></i> Notify Client
                        </button>
                        <button onclick="initAddModal()" class="bg-primary hover:bg-primary-dark text-white text-[11px] font-bold py-2 px-4 rounded shadow-sm flex items-center transition-all">
                            <i data-lucide="plus" class="w-3 h-3 mr-2"></i> Add New
                        </button>
                    </div>
                </div>
                
                <div class="overflow-y-auto overflow-x-auto h-[380px] relative bg-white">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 z-20 shadow-sm">
                            <tr class="text-[10px] font-bold text-slate-500 uppercase tracking-widest bg-slate-50">
                                <th class="px-4 py-4 text-center w-12 bg-slate-50">
                                    <input type="checkbox" onchange="toggleSelectAll(this)" class="rounded border-slate-300 text-primary">
                                </th>
                                <th class="px-6 py-4 bg-slate-50">Type</th>
                                <th class="px-6 py-4 bg-slate-50">Username</th>
                                <th class="px-6 py-4 bg-slate-50">Password</th>
                                <th class="px-6 py-4 bg-slate-50">Notes</th>
                                <th class="px-6 py-4 bg-slate-50">Last Updated</th>
                                <th class="px-6 py-4 text-center bg-slate-50">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="credential-body" class="divide-y divide-slate-100 text-sm">
                            <tr><td colspan="7" class="px-6 py-12 text-center text-slate-400 italic text-xs">Connecting to Secure Vault...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add / Edit Modal -->
    <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-emerald-50 px-6 py-4 border-b border-slate-100">
                <h3 id="modal-title" class="text-sm font-bold text-primary uppercase tracking-wider">Credential Details</h3>
            </div>
            <form id="credential-form" class="p-6 space-y-3">
                <input type="hidden" id="form-id">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Software Type</label>
                        <select id="form-type" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-primary outline-none bg-white">
                            <option value="" disabled selected>Select</option>
                            <option value="Zoho Books">Zoho Books</option>
                            <option value="Xero Accounting Software">Xero Accounting Software</option>
                            <option value="Quickbooks">Quickbooks</option>
                            <option value="EmaraTax">EmaraTax</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Login URL</label>
                        <input type="text" id="form-url" class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-primary outline-none" placeholder="https://...">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Username / Email</label>
                    <input type="text" id="form-user" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Password</label>
                    <input type="text" id="form-pass" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Notes</label>
                    <textarea id="form-notes" rows="2" class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-primary outline-none" placeholder="Any specific instructions..."></textarea>
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="button" onclick="closeModal()" class="flex-1 px-4 py-2 text-xs font-bold text-slate-500 hover:bg-slate-50 rounded-lg border">Cancel</button>
                    <button type="submit" id="submit-btn" class="flex-1 px-4 py-2 text-xs font-bold text-white bg-primary hover:bg-primary-dark rounded-lg shadow-md">Save Record</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notify Modal -->
    <div id="notify-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-blue-50 px-6 py-4 border-b border-blue-100 flex items-center justify-between">
                <h3 class="text-xs font-black text-blue-600 uppercase tracking-widest">Trigger Email</h3>
                <span id="selected-count" class="bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Recipient Email</label>
                    <input type="email" id="client-email" required class="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="client@example.com">
                </div>
                <div class="flex space-x-3 pt-2">
                    <button onclick="closeNotifyModal()" class="flex-1 px-4 py-2 text-xs font-bold text-slate-500 hover:bg-slate-50 rounded-lg border">Cancel</button>
                    <button onclick="processNotification()" id="notify-btn" class="flex-1 px-4 py-2 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-lg">Send Now</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="alert-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xs rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-6 text-center">
                <h3 id="alert-title" class="text-sm font-bold text-slate-800 uppercase tracking-wider">Status</h3>
                <p id="alert-message" class="mt-2 text-[11px] text-slate-500 leading-relaxed"></p>
                <div id="alert-actions" class="flex space-x-3 pt-6"></div>
            </div>
        </div>
    </div>

    <script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbededAppSDK.min.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
